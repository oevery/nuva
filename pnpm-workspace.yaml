shellEmulator: true

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 4320

packages:
  - core
  - template
  - docs

overrides:
  '@oevery/nuva': 'workspace:*'

catalog:
  '@antfu/eslint-config': ^9.0.0
  '@iconify-json/lucide': ^1.2.111
  '@nuxt/content': ^3.14.0
  '@nuxt/icon': ^2.2.3
  '@nuxt/kit': ^4.4.7
  '@nuxt/test-utils': ^4.0.3
  '@nuxt/ui': ^4.8.1
  '@tailwindcss/vite': ^4.3.0
  '@types/node': ^25.9.1
  '@vitest/coverage-v8': ^4.1.8
  '@vue/test-utils': ^2.4.10
  '@vueuse/nuxt': ^14.3.0
  alova: ^3.5.1
  better-auth: ^1.6.14
  defu: ^6.1.7
  eslint: ^10.4.1
  eslint-plugin-format: ^2.0.1
  happy-dom: ^20.9.0

  msw: ^2.14.6
  nuxt: ^4.4.7
  ohash: ^2.0.11
  tailwindcss: ^4.3.0
  typescript: ^6.0.3
  valibot: ^1.4.1
  vitest: ^4.1.8
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msw: true
  unrs-resolver: true
  vue-demi: true
